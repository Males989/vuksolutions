<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vuk Solutions</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #ffffff;
      --primary: #0b234d;
      --secondary: #4f5f7a;
      --line: rgba(11, 35, 77, 0.08);
      --dot: rgba(11, 35, 77, 0.18);
      --badge-bg: rgba(11, 35, 77, 0.03);
      --badge-border: rgba(11, 35, 77, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      font-family: 'Manrope', sans-serif;
      color: var(--primary);
    }

    body {
      overflow: hidden;
    }

    #network {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      align-items: center;
      gap: 48px;
      padding: 48px 56px;
    }

    .logo-side {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      animation: fadeLeft 1.1s ease;
    }

    .logo-side img {
      width: min(100%, 760px);
      max-height: 80vh;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 18px 28px rgba(11, 35, 77, 0.08));
    }

    .content-side {
      display: flex;
      justify-content: flex-end;
      min-width: 0;
      animation: fadeRight 1.1s ease;
    }

    .content-box {
      width: 100%;
      max-width: 560px;
      text-align: right;
    }

    .badge {
      display: inline-block;
      margin-bottom: 22px;
      padding: 9px 16px;
      border-radius: 999px;
      background: var(--badge-bg);
      border: 1px solid var(--badge-border);
      color: var(--secondary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .headline {
      margin: 0;
      font-size: clamp(36px, 5vw, 64px);
      line-height: 1.02;
      letter-spacing: -0.04em;
      font-weight: 800;
      color: var(--primary);
    }

    .headline-sub {
      margin: 18px 0 0 0;
      font-size: clamp(18px, 1.8vw, 24px);
      line-height: 1.45;
      font-weight: 600;
      color: var(--secondary);
    }

    .divider {
      width: 72px;
      height: 2px;
      margin: 34px 0 28px auto;
      background: linear-gradient(90deg, rgba(11,35,77,0), rgba(11,35,77,0.45));
      border-radius: 999px;
    }

    .eng-title {
      margin: 0;
      font-size: clamp(18px, 1.65vw, 23px);
      line-height: 1.45;
      font-weight: 700;
      color: var(--primary);
    }

    .eng-sub {
      margin: 10px 0 0 0;
      font-size: clamp(15px, 1.2vw, 18px);
      line-height: 1.6;
      font-weight: 500;
      color: var(--secondary);
    }

    .contact {
      margin-top: 42px;
      font-size: 15px;
      line-height: 1.9;
      font-weight: 600;
      color: var(--secondary);
    }

    .contact a {
      color: var(--primary);
      text-decoration: none;
      border-bottom: 1px solid rgba(11, 35, 77, 0.18);
      transition: opacity 0.25s ease, border-color 0.25s ease;
    }

    .contact a:hover {
      opacity: 0.8;
      border-bottom-color: rgba(11, 35, 77, 0.38);
    }

    @keyframes fadeLeft {
      from {
        opacity: 0;
        transform: translateX(-28px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeRight {
      from {
        opacity: 0;
        transform: translateX(28px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .page {
        grid-template-columns: 1fr;
        gap: 18px;
        padding: 28px 20px 34px;
      }

      .logo-side {
        padding-top: 6px;
      }

      .logo-side img {
        width: min(100%, 580px);
        max-height: 42vh;
      }

      .content-side {
        justify-content: center;
      }

      .content-box {
        max-width: 680px;
        text-align: center;
      }

      .divider {
        margin: 30px auto 24px;
        background: linear-gradient(90deg, rgba(11,35,77,0), rgba(11,35,77,0.45), rgba(11,35,77,0));
      }
    }

    @media (max-width: 560px) {
      .page {
        padding: 20px 16px 28px;
      }

      .logo-side img {
        max-height: 34vh;
      }

      .headline {
        font-size: 34px;
      }

      .headline-sub,
      .eng-title {
        font-size: 18px;
      }

      .eng-sub,
      .contact {
        font-size: 14px;
      }

      .badge {
        font-size: 11px;
        letter-spacing: 0.12em;
      }
    }
  </style>
</head>
<body>
  <canvas id="network"></canvas>

  <main class="page">
    <section class="logo-side">
      <img src="logo.png" alt="Vuk Solutions logo">
    </section>

    <section class="content-side">
      <div class="content-box">
        <div class="badge">U pripremi • In progress</div>

        <h1 class="headline">Nešto veliko je u nastajanju.</h1>
        <p class="headline-sub">Uskoro otkrivamo više.</p>

        <div class="divider"></div>

        <p class="eng-title">Something powerful is in the making.</p>
        <p class="eng-sub">More will be revealed soon.</p>

        <div class="contact">
          Kontakt / Contact:<br>
          <a href="mailto:info@vuksolutions.com">info@vuksolutions.com</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('network');
    const ctx = canvas.getContext('2d');

    let width = window.innerWidth;
    let height = window.innerHeight;
    let particles = [];

    const particleCount = window.innerWidth < 768 ? 28 : 46;
    const maxDistance = window.innerWidth < 768 ? 120 : 170;

    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }

    function createParticles() {
      particles = [];
      const count = window.innerWidth < 768 ? 28 : 46;

      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          vx: (Math.random() - 0.5) * 0.28,
          vy: (Math.random() - 0.5) * 0.28,
          r: Math.random() * 1.6 + 1.1
        });
      }
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];

        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0 || p.x > width) p.vx *= -1;
        if (p.y < 0 || p.y > height) p.vy *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(11, 35, 77, 0.15)';
        ctx.fill();

        for (let j = i + 1; j < particles.length; j++) {
          const q = particles[j];
          const dx = p.x - q.x;
          const dy = p.y - q.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < maxDistance) {
            const opacity = 1 - dist / maxDistance;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(q.x, q.y);
            ctx.strokeStyle = `rgba(11, 35, 77, ${opacity * 0.08})`;
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(animate);
    }

    resizeCanvas();
    createParticles();
    animate();

    window.addEventListener('resize', () => {
      resizeCanvas();
      createParticles();
    });
  </script>
</body>
</html>
