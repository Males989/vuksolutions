<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vuk Solutions</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #ffffff;
      --text: #0b234d;
      --muted: #4f5f7a;
      --accent: #0b234d;
      --accent-soft: #dfe7f3;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      font-family: 'Manrope', Arial, sans-serif;
      color: var(--text);
    }

    body {
      min-height: 100vh;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      background: linear-gradient(180deg, #ffffff 0%, #f7f9fc 100%);
    }

    .wrapper {
      width: 100%;
      max-width: 1440px;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      align-items: center;
      gap: 64px;
    }

    .logo-side {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      animation: fadeLeft 1.3s ease;
    }

    .logo-side img {
      width: min(100%, 760px);
      max-height: 78vh;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 20px 30px rgba(11, 35, 77, 0.08));
    }

    .content-side {
      display: flex;
      justify-content: flex-end;
      animation: fadeRight 1.3s ease;
    }

    .content-box {
      max-width: 560px;
      width: 100%;
      text-align: right;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 14px;
      border: 1px solid rgba(11, 35, 77, 0.12);
      border-radius: 999px;
      background: rgba(11, 35, 77, 0.03);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .headline {
      margin: 0 0 18px 0;
      font-size: clamp(34px, 5vw, 64px);
      line-height: 1.02;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--accent);
    }

    .sub-block {
      margin-top: 26px;
    }

    .main-text {
      margin: 0;
      font-size: clamp(18px, 2vw, 24px);
      line-height: 1.35;
      font-weight: 700;
      color: var(--accent);
    }

    .sub-text {
      margin: 8px 0 0 0;
      font-size: clamp(15px, 1.3vw, 18px);
      line-height: 1.6;
      color: var(--muted);
      font-weight: 500;
    }

    .machine {
      position: relative;
      width: 110px;
      height: 110px;
      margin: 42px 0 36px auto;
    }

    .gear {
      position: absolute;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, #ffffff 0 24%, transparent 25% 100%),
        repeating-conic-gradient(
          from 0deg,
          var(--accent) 0deg 18deg,
          transparent 18deg 30deg
        );
      box-shadow: 0 8px 24px rgba(11, 35, 77, 0.12);
    }

    .gear::after {
      content: "";
      position: absolute;
      inset: 22%;
      border-radius: 50%;
      background: #ffffff;
      border: 3px solid rgba(11, 35, 77, 0.12);
    }

    .gear-large {
      width: 72px;
      height: 72px;
      right: 0;
      top: 26px;
      animation: spinClockwise 7s linear infinite;
    }

    .gear-small {
      width: 48px;
      height: 48px;
      left: 8px;
      top: 0;
      animation: spinCounter 5.5s linear infinite;
    }

    .contact {
      margin-top: 8px;
      font-size: 15px;
      line-height: 1.8;
      color: var(--muted);
      font-weight: 600;
    }

    .contact a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(11, 35, 77, 0.18);
      transition: all 0.25s ease;
    }

    .contact a:hover {
      border-bottom-color: var(--accent);
      opacity: 0.85;
    }

    @keyframes spinClockwise {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes spinCounter {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }

    @keyframes fadeLeft {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeRight {
      from {
        opacity: 0;
        transform: translateX(30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @media (max-width: 980px) {
      .page {
        padding: 28px 20px 36px;
      }

      .wrapper {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .logo-side {
        min-height: auto;
      }

      .logo-side img {
        width: min(100%, 560px);
        max-height: 42vh;
      }

      .content-side {
        justify-content: center;
      }

      .content-box {
        max-width: 680px;
        text-align: center;
      }

      .machine {
        margin: 34px auto 28px;
      }
    }

    @media (max-width: 560px) {
      .page {
        padding: 22px 16px 30px;
      }

      .logo-side img {
        max-height: 34vh;
      }

      .headline {
        font-size: 34px;
      }

      .main-text {
        font-size: 18px;
      }

      .sub-text,
      .contact {
        font-size: 14px;
      }

      .eyebrow {
        font-size: 11px;
        letter-spacing: 0.12em;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="wrapper">
      <section class="logo-side">
        <img src="logo.png" alt="Vuk Solutions logo">
      </section>

      <section class="content-side">
        <div class="content-box">
          <div class="eyebrow">U pripremi • In progress</div>

          <h1 class="headline">Nešto veliko je u nastajanju.</h1>

          <div class="sub-block">
            <p class="main-text">Ostanite uz nas.</p>
          </div>

          <div class="sub-block">
            <p class="main-text">Something powerful is in the making.</p>
            <p class="sub-text">Stay tuned.</p>
          </div>

          <div class="machine" aria-hidden="true">
            <div class="gear gear-small"></div>
            <div class="gear gear-large"></div>
          </div>

          <div class="contact">
            Kontakt / Contact:<br>
            <a href="mailto:info@vuksolutions.com">info@vuksolutions.com</a>
          </div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
