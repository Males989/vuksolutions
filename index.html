<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vuk Solutions</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f1a;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
}

/* Background logo */
.logo-bg {
    position: absolute;
    width: 600px;
    opacity: 0.05;
    filter: blur(1px);
    animation: pulse 6s infinite ease-in-out;
}

/* Pulse animation */
@keyframes pulse {
    0% { transform: scale(1); opacity: 0.05; }
    50% { transform: scale(1.05); opacity: 0.08; }
    100% { transform: scale(1); opacity: 0.05; }
}

/* Content */
.container {
    position: relative;
    z-index: 2;
    max-width: 600px;
    animation: fadeIn 2s ease forwards;
}

/* Fade in */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

h1 {
    font-size: 42px;
    margin-bottom: 15px;
    letter-spacing: 2px;
}

.main-text {
    font-size: 18px;
    font-weight: bold;
    margin-top: 10px;
}

.sub-text {
    font-size: 15px;
    opacity: 0.6;
}

/* Spinner */
.loader {
    margin: 30px auto;
    border: 3px solid rgba(255,255,255,0.1);
    border-top: 3px solid #38bdf8;
    border-radius: 50%;
    width: 45px;
    height: 45px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Email */
.email {
    margin-top: 25px;
    font-size: 14px;
    opacity: 0.8;
}

.email a {
    color: #38bdf8;
    text-decoration: none;
}

.email a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<img src="logo.png" class="logo-bg">

<div class="container">
    <h1>VUK SOLUTIONS</h1>

    <div class="main-text">
        Something powerful is in the making.
    </div>
    <div class="sub-text">Stay tuned.</div>

    <br>

    <div class="main-text">
        Nešto veliko je u nastajanju.
    </div>
    <div class="sub-text">Ostanite uz nas.</div>

    <div class="loader"></div>

    <div class="email">
        Contact / Kontakt:<br>
        <a href="mailto:info@vuksolutions.com">info@vuksolutions.com</a>
    </div>
</div>

</body>
</html>
